services:
  hermes-telegram:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HERMES_VERSION: ${HERMES_VERSION:-latest}
    image: better-hermes:${HERMES_VERSION:-latest}
    container_name: hermes-telegram
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"
      - "9119:9119"
    volumes:
      - hermes-telegram-vol:/opt/data
    environment:
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${HERMES_DASHBOARD_BASIC_AUTH_USERNAME}
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD}
      - HERMES_DASHBOARD_BASIC_AUTH_SECRET=${HERMES_DASHBOARD_BASIC_AUTH_SECRET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - EXA_API_KEY=${EXA_API_KEY}
      - TELEGRAM_HOME_CHANNEL=${TELEGRAM_ALLOWED_USERS}
      - DENO_DEPLOY_TOKEN=${DENO_DEPLOY_TOKEN}
      - VERCEL_TOKEN=${VERCEL_TOKEN}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}
      - TURSO_API_TOKEN=${TURSO_API_TOKEN}
      - TURSO_DATABASE_URL=${TURSO_DATABASE_URL}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GH_TOKEN=${GITHUB_TOKEN}
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "2.0"

volumes:
  hermes-telegram-vol: